<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | {{DATE}}</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════
     Design System — Reaction Monitor
     CSS 변수 기반. 컴포넌트가 이 변수를 참조.
     ═══════════════════════════════════════ */

  :root {
    /* 브랜드 */
    --navy: #0a1628;
    --navy-light: #131d33;
    --surface: #161b22;
    --surface-alt: #1c2333;
    --border: #30363d;
    --border-light: #3d444d;

    /* 텍스트 */
    --text: #e6edf3;
    --text-secondary: #b0b8c1;
    --muted: #8b949e;
    --accent: #58a6ff;

    /* 반응 계층 */
    --price: #42a5f5;
    --narrative: #ff9800;
    --expert: #ab47bc;
    --policy: #ef5350;
    --positioning: #66bb6a;

    /* 판정 */
    --green: #4caf50;
    --yellow: #ff9800;
    --red: #f44336;
    --converge: #4caf50;
    --diverge: #ff9800;
    --decouple: #f44336;
    --silence: #9e9e9e;

    /* report-class 색상 */
    --crisis: #f44336;
    --special: #1565c0;
    --research: #0a1628;
    --strategy: #f9a825;

    /* 간격 */
    --gap-xs: .25rem;
    --gap-sm: .5rem;
    --gap-md: 1rem;
    --gap-lg: 1.5rem;
    --gap-xl: 2.5rem;

    /* 라운딩 */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  /* ── Reset ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, 'Segoe UI', sans-serif;
    background: var(--navy);
    color: var(--text);
    line-height: 1.7;
    max-width: 860px;
    margin: 0 auto;
    padding: 0;
  }

  /* ── Topbar ── */
  .topbar {
    padding: .5rem 2rem;
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topbar.crisis   { background: var(--crisis); color: #fff; }
  .topbar.special   { background: var(--special); color: #fff; }
  .topbar.research  { background: var(--navy-light); color: var(--muted); border-bottom: 1px solid var(--border); }
  .topbar.strategy  { background: var(--strategy); color: var(--navy); }

  /* ── Report Header ── */
  .report-header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .report-header h1 {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: .4rem;
  }
  .report-header .subtitle {
    font-size: .9rem;
    color: var(--text-secondary);
    margin-bottom: .75rem;
  }
  .report-header .meta {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    color: var(--muted);
  }

  /* ── Content Container ── */
  .content { padding: 0 2rem 2rem; }

  /* ── Typography ── */
  h2 {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 1.15rem;
    font-weight: 700;
    margin: var(--gap-xl) 0 var(--gap-md);
    padding-bottom: var(--gap-sm);
    border-bottom: 1px solid var(--border);
  }
  h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    margin: var(--gap-lg) 0 var(--gap-sm);
  }
  p { font-size: .88rem; margin-bottom: var(--gap-sm); }

  /* 수치 강조 */
  .num {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }

  /* ── 판정 배지 ── */
  .badge {
    display: inline-block;
    padding: .25rem .65rem;
    border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    font-weight: 600;
    line-height: 1;
  }
  .badge-green  { background: rgba(76,175,80,.15); color: var(--green); border: 1px solid rgba(76,175,80,.3); }
  .badge-yellow { background: rgba(255,152,0,.15); color: var(--yellow); border: 1px solid rgba(255,152,0,.3); }
  .badge-red    { background: rgba(244,67,54,.15); color: var(--red); border: 1px solid rgba(244,67,54,.3); }
  .badge-blue   { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }
  .badge-muted  { background: rgba(158,158,158,.15); color: var(--silence); border: 1px solid rgba(158,158,158,.3); }

  /* 계층 태그 */
  .layer-tag {
    display: inline-block;
    padding: .15rem .5rem;
    border-radius: var(--radius-sm);
    font-size: .7rem;
    font-weight: 700;
    margin-right: .3rem;
  }
  .lt-price      { background: rgba(66,165,245,.15); color: var(--price); }
  .lt-narrative   { background: rgba(255,152,0,.15); color: var(--narrative); }
  .lt-expert      { background: rgba(171,71,188,.15); color: var(--expert); }
  .lt-policy      { background: rgba(239,83,80,.15); color: var(--policy); }
  .lt-positioning { background: rgba(102,187,106,.15); color: var(--positioning); }

  /* 톤 */
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--yellow); }
  .spl { color: var(--expert); }
  .silent { color: var(--silence); }

  /* ── 테이블 ── */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: var(--gap-md) 0;
    font-size: .82rem;
  }
  th {
    background: var(--surface);
    color: var(--muted);
    text-align: left;
    padding: .5rem .6rem;
    border: 1px solid var(--border);
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
  }
  td {
    padding: .5rem .6rem;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  tr:hover td { background: rgba(88,166,255,.04); }

  /* ── 카드 (범용) ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1.25rem;
    margin: var(--gap-md) 0;
  }
  .card h3 { margin-top: 0; }

  /* ── Exec Box (Core Claim) ── */
  .exec-box {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
    border: 1px solid var(--accent);
    border-left: 4px solid var(--accent);
    border-radius: var(--radius-md);
    padding: 1.25rem 1.5rem;
    margin: var(--gap-lg) 0;
  }
  .exec-box .claim {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: .5rem;
  }
  .exec-box .verdict {
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    color: var(--text-secondary);
  }

  /* ── Alert Box ── */
  .alert-box {
    border-radius: var(--radius-md);
    padding: 1rem 1.25rem;
    margin: var(--gap-md) 0;
    font-size: .85rem;
  }
  .alert-box.warn  { background: rgba(255,152,0,.1); border: 1px solid rgba(255,152,0,.3); border-left: 4px solid var(--yellow); }
  .alert-box.danger { background: rgba(244,67,54,.1); border: 1px solid rgba(244,67,54,.3); border-left: 4px solid var(--red); }
  .alert-box.info  { background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.25); border-left: 4px solid var(--accent); }

  /* ── 코멘트 (해석) ── */
  .comment {
    background: rgba(88,166,255,.06);
    border-left: 3px solid var(--accent);
    padding: .75rem 1rem;
    margin: var(--gap-md) 0;
    font-size: .85rem;
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .comment strong { color: var(--accent); }

  /* ── 방향 그리드 ── */
  .direction-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--gap-sm);
    margin: .75rem 0;
    text-align: center;
  }
  .direction-cell {
    padding: .5rem;
    border-radius: var(--radius-md);
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
  }
  .direction-label { font-size: .7rem; color: var(--muted); display: block; }
  .direction-value { font-size: 1.1rem; font-weight: 700; margin-top: .2rem; }

  /* ── 타임라인 ── */
  .timeline {
    position: relative;
    padding-left: 2rem;
    margin: var(--gap-md) 0;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: .6rem;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-item {
    position: relative;
    margin-bottom: .75rem;
    font-size: .82rem;
  }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -1.65rem;
    top: .45rem;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--navy);
  }
  .timeline-item.highlight::before { border-color: var(--red); background: rgba(244,67,54,.2); }
  .timeline-date { color: var(--muted); font-size: .75rem; font-family: 'DM Mono', monospace; }

  /* ── 시나리오 그리드 ── */
  .scenario-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--gap-md);
    margin: var(--gap-md) 0;
  }
  .scenario-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
    position: relative;
    overflow: hidden;
  }
  .scenario-card .prob {
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: .3rem;
  }
  .scenario-card .label {
    font-size: .85rem;
    font-weight: 600;
    margin-bottom: .5rem;
  }
  .scenario-card .desc { font-size: .8rem; color: var(--text-secondary); }

  /* ── 2컬럼 대비 ── */
  .clash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap-md);
    margin: var(--gap-md) 0;
  }
  .clash-side {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
  }
  .clash-side.bull { border-top: 3px solid var(--green); }
  .clash-side.bear { border-top: 3px solid var(--red); }
  .clash-side h4 { font-size: .9rem; margin-bottom: .5rem; }

  /* ── 지문 그리드 ── */
  .fingerprint-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: .3rem .75rem;
    background: var(--surface);
    padding: 1rem;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    font-size: .85rem;
  }
  .fp-label { color: var(--muted); font-weight: 600; }

  /* ── 미해소 질문 ── */
  .uq-list { list-style: none; padding: 0; }
  .uq-list li { padding: .75rem 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .uq-open::before { content: '\23F3'; margin-right: .5rem; }
  .uq-resolved::before { content: '\2705'; margin-right: .5rem; }
  .uq-type {
    display: inline-block;
    padding: .1rem .4rem;
    border-radius: 3px;
    font-size: .7rem;
    font-weight: 600;
    margin-left: .3rem;
  }
  .uq-date      { background: rgba(66,165,245,.15); color: var(--price); }
  .uq-condition  { background: rgba(255,152,0,.15); color: var(--diverge); }
  .uq-data       { background: rgba(102,187,106,.15); color: var(--positioning); }
  .uq-threshold  { background: rgba(171,71,188,.15); color: var(--expert); }
  .uq-meta { font-size: .75rem; color: var(--muted); margin-top: .3rem; }
  .uq-help { font-size: .78rem; color: var(--accent); font-style: italic; }

  /* ── 소스 ── */
  .sources { font-size: .78rem; color: var(--muted); margin-top: var(--gap-md); }
  .sources a { color: var(--accent); text-decoration: none; }
  .sources a:hover { text-decoration: underline; }
  .sources li { margin-bottom: .3rem; }

  /* ── 상태 바 (배지 행) ── */
  .status-bar {
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
    margin: var(--gap-md) 0;
  }

  /* ── 면책 ── */
  .disclaimer {
    text-align: center;
    color: var(--muted);
    font-size: .7rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  /* ── 반응형 ── */
  @media (max-width: 780px) {
    body { max-width: 100%; }
    .topbar, .report-header, .content { padding-left: 1rem; padding-right: 1rem; }
    .report-header h1 { font-size: 1.3rem; }
    .direction-grid { grid-template-columns: repeat(3, 1fr); }
    .clash-grid { grid-template-columns: 1fr; }
    .scenario-grid { grid-template-columns: 1fr; }
    .fingerprint-grid { grid-template-columns: 90px 1fr; }
  }
</style>
</head>
<body>
<!--
  이 파일은 CSS + 폰트 기반만 포함.
  render_adaptive.py 또는 LLM이 이 안에 컴포넌트를 조합하여 보고서를 생성한다.

  사용 순서:
  1. 이 파일을 읽어 CSS 변수와 클래스명을 파악
  2. component-catalog.md를 읽어 사용 가능한 컴포넌트 확인
  3. Phase 1~4에 따라 구조를 설계하고 HTML을 생성
-->

<!-- topbar: crisis | special | research | strategy -->
<div class="topbar {{TOPBAR_CLASS}}">
  <span>{{REPORT_CLASS}}</span>
  <span>{{DATE}}</span>
</div>

<!-- report-header -->
<div class="report-header">
  <h1>{{TITLE}}</h1>
  <div class="subtitle">{{SUBTITLE}}</div>
  <div class="meta">{{DATE}} | {{DEPTH}} | Market Reaction Monitor</div>
</div>

<div class="content">
  <!-- 여기부터 Phase 2에서 설계한 섹션들이 들어간다 -->
  {{BODY}}
</div>

<div class="disclaimer">
  Market Reaction Monitor | reaction-monitor | {{DATE}}<br>
  이 보고서는 시장 반응 수집 결과이며, 투자 판단을 제공하지 않습니다.
</div>

</body>
</html>
